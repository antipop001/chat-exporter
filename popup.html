<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: -apple-system, sans-serif;
      width: 240px;
      padding: 12px;
    }
    button {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #status {
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
    #hint {
      font-size: 11px;
      color: #888;
      margin-top: 8px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <button id="exportTopDown">Export (top → bottom)</button>
  <button id="exportBottomUp">Export (bottom → top)</button>
  <div id="status"></div>
  <div id="hint">You can close this popup — the export keeps running and the
    file downloads when it finishes. Reopen to check progress.</div>
  <script src="popup.js"></script>
</body>
</html>
